<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مدينتي - منصة التدبير الحضري بطانطان</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- الشريط العلوي -->
    <header class="navbar">
        <div class="logo">🏙️ مدينتي</div>
        <nav>
            <a href="index.html">الرئيسية</a>
            <a href="report.html">إرسال تبليغ</a>
            <a href="track.html">تتبع تبليغ</a>
        </nav>
    </header>

    <!-- قسم الترحيب -->
    <section class="hero">
        <h1>منصة مدينتي</h1>
        <p>شارك في تحسين مدينتك! بلّغ عن أي خلل حضري في طانطان وتابع حالته بسهولة.</p>
        <a href="report.html" class="btn btn-primary">إرسال تبليغ جديد</a>
        <a href="track.html" class="btn btn-secondary">تتبع تبليغ سابق</a>
    </section>

    <!-- قسم الإحصائيات -->
    <section class="stats">
        <div class="stat-box">
            <h2 id="resolved-count">0</h2>
            <p>تبليغ تم حله</p>
        </div>
        <div class="stat-box">
            <h2 id="pending-count">0</h2>
            <p>تبليغ قيد المعالجة</p>
        </div>
        <div class="stat-box">
            <h2 id="total-count">0</h2>
            <p>إجمالي التبليغات</p>
        </div>
    </section>

    <!-- التذييل -->
    <footer>
        <p>© 2026 منصة مدينتي - طانطان. جميع الحقوق محفوظة.</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
